services:
  postgres:
    image: postgres:16
    container_name: legacy-postgres
    environment:
      POSTGRES_DB: legacy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - legacy-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d legacy"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  legacy-postgres-data:
