spring:
  ai:
    openai:
      api-key: ${GROQ_API_KEY:}
      base-url: ${GROQ_BASE_URL:https://api.groq.com/openai/v1}
      chat:
        model: ${GROQ_MODEL:openai/gpt-oss-120b}
        temperature: 0.7
        max-tokens: 500
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/legacy}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

legacy:
  jwt:
    secret: ${JWT_SECRET:legacy-dev-secret-key-change-this-value-123456}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
